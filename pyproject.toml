[project]
name = "grounded"
version = "0.1.0"
description = "A verifiable research agent: Tavily-powered answers you can audit, claim by claim."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "langchain>=1.0.0",
    "langchain-anthropic>=0.3.0",
    "langchain-tavily>=0.2.0",
    "pydantic>=2.7",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
    "tenacity>=8.2",
    # Observability — OpenTelemetry via OpenInference, viewable in a local Phoenix UI
    "arize-phoenix>=4.0.0",
    "openinference-instrumentation-langchain>=0.1.20",
    "opentelemetry-sdk>=1.27.0",
    "opentelemetry-exporter-otlp-proto-http>=1.27.0",
]

[project.optional-dependencies]
nebius = ["langchain-nebius>=0.1.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
grounded = "grounded.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/grounded"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
